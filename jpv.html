<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文單字閃卡</title>
    <style>
        :root { --bg: #f5f7fa; --card: #ffffff; --primary: #4a90e2; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; margin-top: 50px; text-align: center; }
        .card-container { perspective: 1000px; width: 100%; height: 250px; cursor: pointer; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-radius: 15px; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; border-radius: 15px; background: var(--card); padding: 20px; box-sizing: border-box; }
        .card-back { transform: rotateY(180deg); color: var(--primary); background: #f0f7ff; }
        .controls { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px 25px; border: none; border-radius: 25px; background: var(--primary); color: white; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h3 id="title">載入中...</h3>
    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front" id="frontText">...</div>
            <div class="card-face card-back" id="backText">...</div>
        </div>
    </div>
    <div class="controls">
        <button onclick="prevCard()">上一個</button>
        <button onclick="nextCard()">下一個</button>
    </div>
    <p id="progress" style="margin-top: 20px; color: #666;"></p>
</div>

<script>
    let words = [];
    let currentIndex = 0;

    // 自動讀取同資料夾下的 words.csv
    fetch('words.csv')
        .then(response => response.text())
        .then(text => {
            const lines = text.trim().split('\n');
            words = lines.map(line => {
                const parts = line.split(',');
                return parts.length >= 2 ? {f: parts[0].trim(), b: parts[1].trim()} : null;
            }).filter(item => item !== null);
            
            if (words.length > 0) {
                document.getElementById('title').innerText = "日文單字閃卡";
                updateCard();
            } else {
                document.getElementById('title').innerText = "找不到單字數據";
            }
        })
        .catch(err => {
            document.getElementById('title').innerText = "讀取失敗";
            console.error(err);
        });

    function flipCard() { document.getElementById('card').classList.toggle('flipped'); }

    function updateCard() {
        const card = document.getElementById('card');
        card.classList.remove('flipped');
        setTimeout(() => {
            document.getElementById('frontText').innerText = words[currentIndex].f;
            document.getElementById('backText').innerText = words[currentIndex].b;
            document.getElementById('progress').innerText = `進度：${currentIndex + 1} / ${words.length}`;
        }, 150);
    }

    function nextCard() { currentIndex = (currentIndex + 1) % words.length; updateCard(); }
    function prevCard() { currentIndex = (currentIndex - 1 + words.length) % words.length; updateCard(); }
</script>
</body>
</html>
