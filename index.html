<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日文單字閃卡 Pro</title>
    <style>
        :root { --bg-default: #f0f2f5; --card: #ffffff; --yes: #4caf50; --no: #f44336; --primary: #4a90e2; }
        body { 
            font-family: 'PingFang TC', sans-serif; background-color: var(--bg-default); 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden; touch-action: none;
            transition: background-color 0.3s ease; /* 背景顏色平滑過渡 */
        }
        .container { width: 90%; max-width: 400px; margin-top: 40px; text-align: center; position: relative; flex-grow: 1; }
        
        .card-wrapper { position: relative; width: 100%; height: 350px; margin-top: 20px; }

        .card {
            position: absolute; width: 100%; height: 100%;
            background: var(--card); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; padding: 20px; box-sizing: border-box;
            cursor: grab; user-select: none; z-index: 2;
            opacity: 0; /* 預設隱藏，用於淡入 */
            transform: scale(0.9); /* 預設縮小，用於淡入 */
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* 卡片顯示時的樣式 */
        .card.active { opacity: 1; transform: scale(1) translateX(0) rotate(0); }

        .status-stamp {
            position: absolute; top: 20px; font-size: 1.8rem; font-weight: bold;
            padding: 5px 20px; border: 4px solid; border-radius: 10px;
            opacity: 0; pointer-events: none; z-index: 3; transition: opacity 0.2s;
        }
        .stamp-yes { left: 20px; color: var(--yes); border-color: var(--yes); transform: rotate(-15deg); }
        .stamp-no { right: 20px; color: var(--no); border-color: var(--no); transform: rotate(15deg); }

        .info { margin-top: 40px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">載入中...</h2>
    <div id="progress" style="color: #666; margin-bottom: 10px;"></div>

    <div class="card-wrapper">
        <div id="stampYes" class="status-stamp stamp-yes">會了</div>
        <div id="stampNo" class="status-stamp stamp-no">不會</div>
        <div class="card" id="card"></div>
    </div>

    <div class="info">
        💡 點擊翻面 | ← 往左滑(會了) | 往右滑(不會) →
    </div>
</div>

<script>
    let words = [];
    let currentIndex = 0;
    let isFlipped = false;
    let startX = 0;
    let currentX = 0;

    const body = document.body;
    const card = document.getElementById('card');
    const stampYes = document.getElementById('stampYes');
    const stampNo = document.getElementById('stampNo');

    fetch('words.csv')
        .then(res => res.text())
        .then(text => {
            const lines = text.trim().split('\n');
            words = lines.map(line => {
                const parts = line.split(',');
                return parts.length >= 2 ? {f: parts[0].trim(), b: parts[1].trim()} : null;
            }).filter(i => i !== null);
            if (words.length > 0) {
                document.getElementById('title').innerText = "日文單字背誦";
                showNextCard();
            }
        });

    function showNextCard() {
        isFlipped = false;
        // 1. 先徹底移除 active 類別並重置透明度
        card.classList.remove('active');
        card.style.opacity = "0";
        card.style.transition = "none";
        card.style.transform = "scale(0.9) translateX(0) rotate(0)";
        
        // 2. 稍微延長延遲，確保瀏覽器有時間渲染「消失」的狀態
        setTimeout(() => {
            card.innerText = words[currentIndex].f;
            card.style.color = "black";
            // 3. 強制讓瀏覽器重新計算樣式
            card.offsetHeight; 
            card.style.transition = "opacity 0.6s ease, transform 0.6s ease";
            card.classList.add('active');
            card.style.opacity = "1";
            card.style.transform = "scale(1)";
            updateProgress();
        }, 150); // 縮短等待時間，讓節奏更緊湊
    }

    function updateProgress() {
        document.getElementById('progress').innerText = `進度：${currentIndex + 1} / ${words.length}`;
    }

    // 點擊翻面邏輯
    card.addEventListener('click', () => {
        // 只有在幾乎沒有位移的情況下才判定為點擊
        if (Math.abs(currentX - startX) < 10) {
            isFlipped = !isFlipped;
            card.innerText = isFlipped ? words[currentIndex].b : words[currentIndex].f;
            card.style.color = isFlipped ? "var(--primary)" : "black";
        }
    });

    const handleStart = (e) => {
        startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        currentX = startX; // 初始化避免計算誤差
        card.style.transition = "none";
    };

    const handleMove = (e) => {
        if (!startX) return;
        currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const diff = currentX - startX;
        const rotation = diff / 10;
        
        card.style.transform = `translateX(${diff}px) rotate(${rotation}deg)`;

        if (diff < -30) {
            const alpha = Math.min(Math.abs(diff) / 200, 0.4);
            body.style.backgroundColor = `rgba(76, 175, 80, ${alpha})`;
            stampYes.style.opacity = Math.min(Math.abs(diff) / 100, 1);
            stampNo.style.opacity = 0;
        } else if (diff > 30) {
            const alpha = Math.min(diff / 200, 0.4);
            body.style.backgroundColor = `rgba(244, 67, 54, ${alpha})`;
            stampNo.style.opacity = Math.min(diff / 100, 1);
            stampYes.style.opacity = 0;
        }
    };

    const handleEnd = () => {
        if (!startX) return;
        const diff = currentX - startX;
        
        // 判斷滑動距離
        if (Math.abs(diff) > 100) {
            // 滑掉卡片
            const flyX = diff > 0 ? 1000 : -1000;
            card.style.transition = "transform 0.4s ease-in, opacity 0.4s";
            card.style.transform = `translateX(${flyX}px) rotate(${diff/5}deg)`;
            card.style.opacity = "0";
            
            // 重置背景
            body.style.backgroundColor = "var(--bg-default)";
            stampYes.style.opacity = 0;
            stampNo.style.opacity = 0;
            
            // 切換索引並呼叫下一張
            currentIndex = (currentIndex + 1) % words.length;
            setTimeout(showNextCard, 300);
        } else {
            // 距離不夠，彈回原位
            card.style.transition = "transform 0.3s ease-out";
            card.style.transform = "translateX(0) rotate(0)";
            body.style.backgroundColor = "var(--bg-default)";
            stampYes.style.opacity = 0;
            stampNo.style.opacity = 0;
        }
        
        // 重要：重置座標避免重複觸發
        startX = 0;
        currentX = 0;
    };

    card.addEventListener('touchstart', handleStart, {passive: true});
    card.addEventListener('touchmove', handleMove, {passive: true});
    card.addEventListener('touchend', handleEnd);
    card.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
</script>
</body>
</html>
