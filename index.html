<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日文單字閃卡 Pro</title>
    <style>
        :root { 
            --bg-default: #f0f2f5; 
            --yes: #4caf50; /* 綠色 */
            --no: #f44336;  /* 紅色 */
            --not-sure: #ffeb3b; /* 黃色 */
            --text-main: #2c3e50;
        }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background-color: var(--bg-default); 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden; touch-action: none;
            transition: background-color 0.3s ease;
        }
        .container { width: 90%; max-width: 400px; margin-top: 60px; text-align: center; position: relative; flex-grow: 1; }
        
        #progress { font-size: 1rem; color: #666; margin-bottom: 20px; font-weight: 500; }

        /* 文字顯示區域：去除了白色框框 */
        .text-display-area {
            position: relative; width: 100%; height: 300px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none;
        }

        #mainText {
            font-size: 3rem; font-weight: 800; color: var(--text-main);
            transition: opacity 0.4s ease, transform 0.4s ease, color 0.3s;
            opacity: 0; transform: scale(0.9);
            text-shadow: 0 2px 10px rgba(0,0,0,0.05); /* 輕微陰影增加可讀性 */
        }

        /* 狀態提示文字 */
        .status-stamp {
            position: absolute; top: 0; width: 100%; text-align: center;
            font-size: 2.5rem; font-weight: 900; opacity: 0; pointer-events: none;
            transition: opacity 0.2s; z-index: 10;
        }
        #stampYes { color: #2e7d32; }
        #stampNo { color: #c62828; }
        #stampNotSure { color: #f9a825; top: 100px; }

        .hint { position: absolute; bottom: 50px; width: 100%; color: #999; font-size: 0.85rem; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div id="progress">載入中...</div>

    <div class="text-display-area" id="touchArea">
        <div id="stampYes" class="status-stamp">會了</div>
        <div id="stampNo" class="status-stamp">不會</div>
        <div id="stampNotSure" class="status-stamp">不熟</div>
        
        <div id="mainText">單字</div>
    </div>

    <div class="hint">
        點擊：翻面查看答案<br>
        ← 左滑：會了 | 右滑 →：不會<br>
        ↓ 下滑：不熟
    </div>
</div>

<script>
    let words = [];
    let currentIndex = 0;
    let isFlipped = false;
    let startX = 0, startY = 0;
    let currentX = 0, currentY = 0;

    const body = document.body;
    const touchArea = document.getElementById('touchArea');
    const mainText = document.getElementById('mainText');
    const stamps = {
        yes: document.getElementById('stampYes'),
        no: document.getElementById('stampNo'),
        notSure: document.getElementById('stampNotSure')
    };

    // 讀取 CSV
    fetch('words.csv')
        .then(res => res.text())
        .then(text => {
            const lines = text.trim().split('\n');
            words = lines.map(line => {
                const parts = line.split(',');
                return parts.length >= 2 ? {f: parts[0].trim(), b: parts[1].trim()} : null;
            }).filter(i => i !== null);
            if (words.length > 0) showNextWord();
        });

    function showNextWord() {
        isFlipped = false;
        mainText.style.opacity = "0";
        mainText.style.transform = "scale(0.8)";
        
        setTimeout(() => {
            mainText.innerText = words[currentIndex].f;
            mainText.style.color = "var(--text-main)";
            mainText.offsetHeight; // Reflow
            mainText.style.opacity = "1";
            mainText.style.transform = "scale(1) translateX(0) translateY(0) rotate(0)";
            document.getElementById('progress').innerText = `STEP ${currentIndex + 1} / ${words.length}`;
        }, 200);
    }

    // 點擊翻面
    touchArea.addEventListener('click', () => {
        if (Math.abs(currentX - startX) < 10 && Math.abs(currentY - startY) < 10) {
            isFlipped = !isFlipped;
            mainText.innerText = isFlipped ? words[currentIndex].b : words[currentIndex].f;
            mainText.style.color = isFlipped ? "#1976d2" : "var(--text-main)";
        }
    });

    const handleStart = (e) => {
        const touch = e.type.includes('touch') ? e.touches[0] : e;
        startX = touch.clientX;
        startY = touch.clientY;
        currentX = startX;
        currentY = startY;
        mainText.style.transition = "none";
    };

    const handleMove = (e) => {
        if (!startX) return;
        const touch = e.type.includes('touch') ? e.touches[0] : e;
        currentX = touch.clientX;
        currentY = touch.clientY;
        
        const diffX = currentX - startX;
        const diffY = currentY - startY;

        // 文字跟隨移動
        mainText.style.transform = `translateX(${diffX}px) translateY(${diffY}px) rotate(${diffX/15}deg)`;

        // 重置所有提示
        Object.values(stamps).forEach(s => s.style.opacity = 0);

        // 判斷滑動方向與背景變色
        if (Math.abs(diffX) > Math.abs(diffY)) {
            // 左右滑動優先
            if (diffX < -30) { // 左滑：會了 (綠)
                const alpha = Math.min(Math.abs(diffX) / 200, 0.7);
                body.style.backgroundColor = `rgba(76, 175, 80, ${alpha})`;
                stamps.yes.style.opacity = Math.min(Math.abs(diffX) / 100, 1);
            } else if (diffX > 30) { // 右滑：不會 (紅)
                const alpha = Math.min(diffX / 200, 0.7);
                body.style.backgroundColor = `rgba(244, 67, 54, ${alpha})`;
                stamps.no.style.opacity = Math.min(diffX / 100, 1);
            }
        } else {
            // 上下滑動
            if (diffY > 30) { // 下滑：不熟 (黃)
                const alpha = Math.min(diffY / 200, 0.8);
                body.style.backgroundColor = `rgba(255, 235, 59, ${alpha})`;
                stamps.notSure.style.opacity = Math.min(diffY / 100, 1);
            }
        }
    };

    const handleEnd = () => {
        if (!startX) return;
        const diffX = currentX - startX;
        const diffY = currentY - startY;
        
        const threshold = 100;

        if (Math.abs(diffX) > threshold || diffY > threshold) {
            // 飛走動畫
            mainText.style.transition = "transform 0.4s ease-in, opacity 0.4s";
            if (Math.abs(diffX) > Math.abs(diffY)) {
                mainText.style.transform = `translateX(${diffX > 0 ? 800 : -800}px) rotate(${diffX/5}deg)`;
            } else {
                mainText.style.transform = `translateY(800px)`;
            }
            mainText.style.opacity = "0";

            // 下一張
            currentIndex = (currentIndex + 1) % words.length;
            setTimeout(showNextWord, 300);
        } else {
            // 彈回
            mainText.style.transition = "transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            mainText.style.transform = "translateX(0) translateY(0) rotate(0)";
        }

        // 重置背景與狀態
        body.style.backgroundColor = "var(--bg-default)";
        Object.values(stamps).forEach(s => s.style.opacity = 0);
        startX = 0; startY = 0;
    };

    touchArea.addEventListener('touchstart', handleStart, {passive: true});
    touchArea.addEventListener('touchmove', handleMove, {passive: true});
    touchArea.addEventListener('touchend', handleEnd);
    touchArea.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

</script>
</body>
</html>
