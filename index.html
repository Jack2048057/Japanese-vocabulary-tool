<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日文單字修行 Pro</title>
    <style>
        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #333;
            --yes: #4caf50; --no: #f44336; --maybe: #ffc107; --primary: #4a90e2;
        }
        body.dark-mode {
            --bg: #1a1a1a; --card: #2d2d2d; --text: #f0f0f0; --primary: #75b5ff;
        }

        body { 
            font-family: 'PingFang TC', sans-serif; background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden; touch-action: none;
            transition: background-color 0.3s;
        }

        /* 主選單 */
        #main-menu {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: var(--bg); z-index: 10;
        }
        .menu-btn {
            width: 220px; padding: 18px; margin: 12px; border: none; border-radius: 15px;
            background: var(--primary); color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }

        /* 練習畫面 */
        #game-view { 
            display: none; flex-direction: column; align-items: center; 
            width: 90%; max-width: 400px; height: 100%; padding-top: 20px;
        }
        .status-header { height: 60px; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .status-text { position: absolute; font-size: 2.2rem; font-weight: 900; opacity: 0; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        .card-wrapper { position: relative; width: 100%; height: 380px; margin-top: 10px; }
        .card {
            position: absolute; width: 100%; height: 100%; background: var(--card); border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: bold; padding: 25px; box-sizing: border-box; 
            opacity: 0; transform: scale(0.9); transition: opacity 0.4s, transform 0.4s;
        }
        .card.active { opacity: 1; transform: scale(1); }
        
        /* 深色模式撥鈕 */
        .dark-mode-switch { position: fixed; bottom: 30px; right: 30px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }

        .back-btn { margin-top: 20px; background: none; border: 1px solid var(--text); color: var(--text); padding: 8px 16px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="main-menu">
    <h1>日文單字修行</h1>
    <p id="stats-text" style="opacity: 0.7;">載入資料中...</p>
    <button class="menu-btn" onclick="startPractice()">開始練習 (15題)</button>
    <button class="menu-btn" style="background:#888;" onclick="startAll()">瀏覽全部</button>
    <div class="dark-mode-switch">
        <span>深夜模式</span>
        <label class="switch">
            <input type="checkbox" id="dark-input" onchange="setDarkMode()">
            <span class="slider"></span>
        </label>
    </div>
</div>

<div id="game-view">
    <div class="status-header">
        <div id="text-yes" class="status-text">會了</div>
        <div id="text-no" class="status-text">不會</div>
        <div id="text-maybe" class="status-text">不熟</div>
    </div>
    <div id="progress-text" style="font-weight: bold; margin-bottom: 10px;"></div>
    <div class="card-wrapper">
        <div class="card" id="card"></div>
    </div>
    <button class="back-btn" onclick="backToMenu()">回主選單</button>
</div>

<script>
    let words = [];
    let pool = [];
    let idx = 0;
    let flipped = false;
    let sX, sY, cX, cY;
    let mem = JSON.parse(localStorage.getItem('jap_mem_v4')) || {};

    // 1. 初始化深色模式
    if (localStorage.getItem('dark') === 'true') {
        document.body.classList.add('dark-mode');
        document.getElementById('dark-input').checked = true;
    }
    function setDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('dark', isDark);
    }

    // 2. 讀取資料
    fetch('words.csv').then(r => r.text()).then(t => {
        words = t.trim().split('\n').map((l, i) => {
            const p = l.split(',');
            return { id: 'w'+i, f: p[0].trim(), b: p[1].trim() };
        }).filter(w => w.f);
        updateStats();
    });

    function updateStats() {
        const done = Object.values(mem).filter(v => v >= 3).length;
        document.getElementById('stats-text').innerText = `總單字：${words.length} | 已精通：${done}`;
    }

    // 3. 切換視圖
    function startPractice() {
        // 智慧抽題：找分數最低的
        pool = [...words].sort((a,b) => (mem[a.id]||0) - (mem[b.id]||0)).slice(0, 30);
        pool = pool.sort(() => Math.random() - 0.5).slice(0, 15);
        openGame();
    }
    function startAll() {
        pool = [...words].sort(() => Math.random() - 0.5);
        openGame();
    }
    function openGame() {
        idx = 0;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('game-view').style.display = 'flex';
        renderCard();
    }
    function backToMenu() {
        document.getElementById('main-menu').style.display = 'flex';
        document.getElementById('game-view').style.display = 'none';
        updateStats();
    }

    function renderCard() {
        if (idx >= pool.length) { 
            alert("練習結束！"); 
            return backToMenu(); 
        }
        
        flipped = false;
        const el = document.getElementById('card');
        
        // 1. 徹底移除動畫類別與所有行內樣式
        el.classList.remove('active');
        el.style.transition = "none"; 
        el.style.opacity = "0";
        el.style.transform = "scale(0.9) translate(0, 0) rotate(0)"; // 強制歸零
        
        // 2. 換字
        el.innerText = pool[idx].f;
        el.style.color = "var(--text)";

        // 3. 關鍵：使用 double requestAnimationFrame 確保瀏覽器完成重置
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                el.style.transition = "opacity 0.4s, transform 0.4s";
                el.classList.add('active');
                el.style.opacity = "1";
                el.style.transform = "scale(1)";
                document.getElementById('progress-text').innerText = `進度：${idx + 1} / ${pool.length}`;
            });
        });
    }

    // 4. 滑動邏輯
    const cardEl = document.getElementById('card');
    cardEl.addEventListener('click', () => {
        if (Math.abs(cX - sX) < 10) {
            flipped = !flipped;
            cardEl.innerText = flipped ? pool[idx].b : pool[idx].f;
            cardEl.style.color = flipped ? "var(--primary)" : "var(--text)";
        }
    });

    const start = (e) => {
        sX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        sY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        cX = sX; cY = sY;
        cardEl.style.transition = "none";
    };
    const move = (e) => {
        if (!sX) return;
        cX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        cY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        const dx = cX - sX, dy = cY - sY;
        cardEl.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx/12}deg)`;
        
        resetUI();
        if (dy > 60 && Math.abs(dy) > Math.abs(dx)) { showUI('maybe', dy); }
        else if (dx < -40) { showUI('yes', -dx); }
        else if (dx > 40) { showUI('no', dx); }
    };
    function showUI(type, d) {
        const a = Math.min(d/200, 0.5);
        document.body.style.backgroundColor = type==='yes' ? `rgba(76,175,80,${a})` : type==='no' ? `rgba(244,67,54,${a})` : `rgba(255,193,7,${a})`;
        document.getElementById('text-'+type).style.opacity = Math.min(d/100, 1);
    }
    function resetUI() {
        document.body.style.backgroundColor = "var(--bg)";
        document.querySelectorAll('.status-text').forEach(t => t.style.opacity = 0);
    }
    const end = () => {
        if (!sX) return;
        const dx = cX - sX, dy = cY - sY;
        if (dy > 150) { updateMem('maybe'); fly('Y', 1000); }
        else if (Math.abs(dx) > 130) { updateMem(dx < 0 ? 'yes' : 'no'); fly('X', dx > 0 ? 1000 : -1000, dx/5); }
        else { cardEl.style.transition = "transform 0.3s"; cardEl.style.transform = "translate(0,0)"; resetUI(); }
        sX = 0;
    };
    function updateMem(t) {
        const id = pool[idx].id;
        if(!mem[id]) mem[id] = 0;
        if(t==='yes') mem[id]++; else mem[id] = Math.max(0, mem[id]-1);
        localStorage.setItem('jap_mem_v4', JSON.stringify(mem));
    }
    function fly(axis, d, r=0) {
        cardEl.style.transition = "transform 0.4s ease-in, opacity 0.3s";
        cardEl.style.transform = axis==='X' ? `translateX(${d}px) rotate(${r}deg)` : `translateY(${d}px)`;
        cardEl.style.opacity = "0";
        resetUI(); idx++;
        setTimeout(renderCard, 300);
    }

    cardEl.addEventListener('touchstart', start, {passive:true});
    cardEl.addEventListener('touchmove', move, {passive:true});
    cardEl.addEventListener('touchend', end);
    cardEl.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
</script>
</body>
</html>
