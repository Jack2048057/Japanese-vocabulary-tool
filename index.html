<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日文單字閃卡 Pro - 記憶版</title>
    <style>
        :root { --bg-default: #f0f2f5; --card: #ffffff; --yes: #4caf50; --no: #f44336; --maybe: #ffc107; --primary: #4a90e2; }
        body { 
            font-family: 'PingFang TC', sans-serif; background-color: var(--bg-default); 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden; touch-action: none;
            transition: background-color 0.3s ease;
        }
        .container { width: 90%; max-width: 400px; margin-top: 40px; text-align: center; position: relative; flex-grow: 1; }
        .status-header { height: 60px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; position: relative; }
        .status-text { position: absolute; font-size: 2.2rem; font-weight: 900; opacity: 0; pointer-events: none; transition: opacity 0.2s; color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .card-wrapper { position: relative; width: 100%; height: 350px; }
        .card {
            position: absolute; width: 100%; height: 100%; background: var(--card); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; padding: 20px; box-sizing: border-box; cursor: grab; user-select: none; z-index: 2;
            opacity: 0; transform: scale(0.9); transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .card.active { opacity: 1; transform: scale(1) translateX(0) translateY(0) rotate(0); }
        .info { margin-top: 40px; color: #888; font-size: 0.8rem; line-height: 1.4; }
        .stats { font-size: 0.8rem; color: #4a90e2; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">載入中...</h2>
    <div id="progress" style="color: #666;"></div>
    <div id="statsInfo" class="stats"></div>

    <div class="status-header">
        <div id="textYes" class="status-text">會了</div>
        <div id="textNo" class="status-text">不會</div>
        <div id="textMaybe" class="status-text">不熟</div>
    </div>

    <div class="card-wrapper"><div class="card" id="card"></div></div>

    <div class="info">
        ←左滑：會了 (減少出現) | 右滑→：不會 (增加出現)<br>
        ↓下滑：不熟 (保持出現) | <span onclick="resetMemory()" style="text-decoration:underline; cursor:pointer;">清除記憶重來</span>
    </div>
</div>

<script>
    let words = [];
    let currentIndex = 0;
    let isFlipped = false;
    let startX = 0, startY = 0;
    let currentX = 0, currentY = 0;
    
    // 記憶資料結構
    let memory = JSON.parse(localStorage.getItem('vocab_memory')) || {};

    const body = document.body;
    const card = document.getElementById('card');

    fetch('words.csv')
        .then(res => res.text())
        .then(text => {
            const lines = text.trim().split('\n');
            words = lines.map((line, index) => {
                const parts = line.split(',');
                return parts.length >= 2 ? { id: `w_${index}`, f: parts[0].trim(), b: parts[1].trim() } : null;
            }).filter(i => i !== null);
            if (words.length > 0) {
                document.getElementById('title').innerText = "日文單字背誦";
                sortWordsByMemory();
                showNextCard();
            }
        });

    // 根據記憶權重排序：不會的排在前面
    function sortWordsByMemory() {
        words.sort((a, b) => {
            let scoreA = memory[a.id] || 0;
            let scoreB = memory[b.id] || 0;
            return scoreA - scoreB; // 分數越低(不會)的排越前面
        });
    }

    function showNextCard() {
        isFlipped = false;
        card.classList.remove('active');
        card.style.opacity = "0";
        card.style.transition = "none";
        
        setTimeout(() => {
            card.innerText = words[currentIndex].f;
            card.style.color = "black";
            card.offsetHeight; 
            card.style.transition = "opacity 0.6s ease, transform 0.6s ease";
            card.classList.add('active');
            card.style.opacity = "1";
            card.style.transform = "scale(1)";
            updateUI();
        }, 150);
    }

    function updateUI() {
        document.getElementById('progress').innerText = `目前單字：${currentIndex + 1} / ${words.length}`;
        let mastered = Object.values(memory).filter(v => v > 0).length;
        document.getElementById('statsInfo').innerText = `已掌握：${mastered} 個單字`;
    }

    // 儲存結果並記憶
    function saveResult(type) {
        let currentWord = words[currentIndex];
        if (!memory[currentWord.id]) memory[currentWord.id] = 0;

        if (type === 'yes') memory[currentWord.id] += 2;   // 會了加分
        if (type === 'no') memory[currentWord.id] -= 2;    // 不會扣分
        if (type === 'maybe') memory[currentWord.id] -= 1; // 不熟微扣分

        localStorage.setItem('vocab_memory', JSON.stringify(memory));
    }

    function resetMemory() {
        if(confirm("確定要清除所有學習紀錄嗎？")) {
            localStorage.removeItem('vocab_memory');
            location.reload();
        }
    }

    // 滑動與點擊邏輯 (承襲之前的版本)
    card.addEventListener('click', () => {
        if (Math.abs(currentX - startX) < 10 && Math.abs(currentY - startY) < 10) {
            isFlipped = !isFlipped;
            card.innerText = isFlipped ? words[currentIndex].b : words[currentIndex].f;
            card.style.color = isFlipped ? "var(--primary)" : "black";
        }
    });

    const handleStart = (e) => {
        startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        currentX = startX; currentY = startY;
        card.style.transition = "none";
    };

    const handleMove = (e) => {
        if (!startX) return;
        currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        const diffX = currentX - startX;
        const diffY = currentY - startY;
        card.style.transform = `translateX(${diffX}px) translateY(${diffY}px) rotate(${diffX / 12}deg)`;

        if (diffY > 50 && Math.abs(diffY) > Math.abs(diffX)) {
            updateVisuals('maybe', diffY);
        } else if (diffX < -30) {
            updateVisuals('yes', Math.abs(diffX));
        } else if (diffX > 30) {
            updateVisuals('no', diffX);
        } else {
            resetVisuals();
        }
    };

    function updateVisuals(type, dist) {
        const alpha = Math.min(dist / 200, 0.5);
        const opac = Math.min(dist / 100, 1);
        resetVisuals();
        if (type === 'maybe') { body.style.backgroundColor = `rgba(255, 193, 7, ${alpha})`; document.getElementById('textMaybe').style.opacity = opac; }
        if (type === 'yes') { body.style.backgroundColor = `rgba(76, 175, 80, ${alpha})`; document.getElementById('textYes').style.opacity = opac; }
        if (type === 'no') { body.style.backgroundColor = `rgba(244, 67, 54, ${alpha})`; document.getElementById('textNo').style.opacity = opac; }
    }

    function resetVisuals() {
        body.style.backgroundColor = "var(--bg-default)";
        document.querySelectorAll('.status-text').forEach(el => el.style.opacity = 0);
    }

    const handleEnd = () => {
        if (!startX) return;
        const diffX = currentX - startX;
        const diffY = currentY - startY;
        
        if (diffY > 150) {
            saveResult('maybe');
            exitCard('Y', 1000);
        } else if (Math.abs(diffX) > 120) {
            saveResult(diffX < 0 ? 'yes' : 'no');
            exitCard('X', diffX > 0 ? 1000 : -1000, diffX/5);
        } else {
            card.style.transition = "transform 0.3s ease-out";
            card.style.transform = "translateX(0) translateY(0) rotate(0)";
            resetVisuals();
        }
        startX = 0; startY = 0;
    };

    function exitCard(axis, dist, rot = 0) {
        card.style.transition = "transform 0.4s ease-in, opacity 0.4s";
        card.style.transform = axis === 'X' ? `translateX(${dist}px) rotate(${rot}deg)` : `translateY(${dist}px)`;
        card.style.opacity = "0";
        resetVisuals();
        currentIndex = (currentIndex + 1) % words.length;
        // 如果一輪結束了，重新根據記憶排序
        if (currentIndex === 0) sortWordsByMemory();
        setTimeout(showNextCard, 300);
    }

    card.addEventListener('touchstart', handleStart, {passive: true});
    card.addEventListener('touchmove', handleMove, {passive: true});
    card.addEventListener('touchend', handleEnd);
    card.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
</script>
</body>
</html>
