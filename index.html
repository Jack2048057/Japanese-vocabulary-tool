<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日文單字閃卡 Pro</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --yes: #4caf50; --no: #f44336; }
        body { 
            font-family: 'PingFang TC', sans-serif; background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden; touch-action: none;
        }
        .container { width: 90%; max-width: 400px; margin-top: 40px; text-align: center; position: relative; flex-grow: 1; }
        
        /* 卡片容器 */
        .card-wrapper {
            position: relative; width: 100%; height: 350px; margin-top: 20px;
        }

        .card {
            position: absolute; width: 100%; height: 100%;
            background: var(--card); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; padding: 20px; box-sizing: border-box;
            transition: transform 0.1s ease-out, background-color 0.3s;
            cursor: grab; user-select: none; z-index: 2;
        }

        /* 滑動狀態文字提示 */
        .status-stamp {
            position: absolute; top: 20px; font-size: 1.5rem; font-weight: bold;
            padding: 5px 15px; border: 4px solid; border-radius: 10px;
            opacity: 0; pointer-events: none; z-index: 3;
        }
        .stamp-yes { left: 20px; color: var(--yes); border-color: var(--yes); transform: rotate(-15deg); }
        .stamp-no { right: 20px; color: var(--no); border-color: var(--no); transform: rotate(15deg); }

        .info { margin-top: 40px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">載入中...</h2>
    <div id="progress" style="color: #666; margin-bottom: 10px;"></div>

    <div class="card-wrapper">
        <div id="stampYes" class="status-stamp stamp-yes">會了</div>
        <div id="stampNo" class="status-stamp stamp-no">不會</div>
        
        <div class="card" id="card">載入中...</div>
    </div>

    <div class="info">
        💡 點擊翻面 | ← 往左滑(會了) | 往右滑(不會) →
    </div>
</div>

<script>
    let words = [];
    let currentIndex = 0;
    let isFlipped = false;
    
    // 觸控與滑動變數
    let startX = 0;
    let currentX = 0;
    const card = document.getElementById('card');
    const stampYes = document.getElementById('stampYes');
    const stampNo = document.getElementById('stampNo');

    fetch('words.csv')
        .then(res => res.text())
        .then(text => {
            const lines = text.trim().split('\n');
            words = lines.map(line => {
                const parts = line.split(',');
                return parts.length >= 2 ? {f: parts[0].trim(), b: parts[1].trim()} : null;
            }).filter(i => i !== null);
            if (words.length > 0) {
                document.getElementById('title').innerText = "日文單字背誦";
                updateUI();
            }
        });

    function updateUI() {
        isFlipped = false;
        card.style.transform = "translateX(0) rotate(0)";
        card.style.backgroundColor = "white";
        card.innerText = words[currentIndex].f;
        stampYes.style.opacity = 0;
        stampNo.style.opacity = 0;
        document.getElementById('progress').innerText = `進度：${currentIndex + 1} / ${words.length}`;
    }

    // 點擊翻面
    card.addEventListener('click', () => {
        if (Math.abs(currentX - startX) < 5) { // 確保不是在滑動
            isFlipped = !isFlipped;
            card.innerText = isFlipped ? words[currentIndex].b : words[currentIndex].f;
            card.style.color = isFlipped ? "#4a90e2" : "black";
        }
    });

    // 滑動邏輯 (支援手機觸控與滑鼠)
    const handleStart = (e) => {
        startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        card.style.transition = "none";
    };

    const handleMove = (e) => {
        if (!startX) return;
        currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const diff = currentX - startX;
        const rotation = diff / 10;
        
        card.style.transform = `translateX(${diff}px) rotate(${rotation}deg)`;

        // 漸變顏色與文字顯示
        if (diff < -50) { // 往左滑 (會了)
            const opacity = Math.min(Math.abs(diff) / 150, 1);
            card.style.backgroundColor = `rgba(76, 175, 80, ${opacity * 0.3})`;
            stampYes.style.opacity = opacity;
            stampNo.style.opacity = 0;
        } else if (diff > 50) { // 往右滑 (不會)
            const opacity = Math.min(diff / 150, 1);
            card.style.backgroundColor = `rgba(244, 67, 54, ${opacity * 0.3})`;
            stampNo.style.opacity = opacity;
            stampYes.style.opacity = 0;
        } else {
            card.style.backgroundColor = "white";
            stampYes.style.opacity = 0;
            stampNo.style.opacity = 0;
        }
    };

    const handleEnd = () => {
        const diff = currentX - startX;
        card.style.transition = "transform 0.4s ease, background-color 0.3s";
        
        if (diff < -120) { // 確定往左滑出
            card.style.transform = "translateX(-1000px) rotate(-30deg)";
            setTimeout(nextCard, 200);
        } else if (diff > 120) { // 確定往右滑出
            card.style.transform = "translateX(1000px) rotate(30deg)";
            setTimeout(nextCard, 200);
        } else { // 彈回原位
            card.style.transform = "translateX(0) rotate(0)";
            card.style.backgroundColor = "white";
            stampYes.style.opacity = 0;
            stampNo.style.opacity = 0;
        }
        startX = 0;
        currentX = 0;
    };

    function nextCard() {
        currentIndex = (currentIndex + 1) % words.length;
        updateUI();
    }

    // 監聽事件
    card.addEventListener('touchstart', handleStart);
    card.addEventListener('touchmove', handleMove);
    card.addEventListener('touchend', handleEnd);
    card.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

</script>
</body>
</html>
